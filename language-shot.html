<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Screenshot</title>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --line: #d7dce6;
            --text: #1f2430;
            --muted: #687386;
            --keyword: #0451a5;
            --class: #267f99;
            --string: #a31515;
            --number: #098658;
            --comment: #008000;
            --operator: #333333;
            --function: #795e26;
            --variable: #0070c1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 28px;
            color: var(--text);
            background: var(--bg);
            font-family: Inter, Segoe UI, Arial, sans-serif;
        }

        .shot {
            width: min(920px, 100%);
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 24px 60px rgba(32, 40, 56, 0.16);
        }

        .topbar {
            height: 44px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            border-bottom: 1px solid var(--line);
            background: #f5f7fb;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #febc2e; }
        .dot.green { background: #28c840; }

        .filename {
            margin-left: 12px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .editor {
            display: grid;
            grid-template-columns: auto 1fr;
            min-height: 520px;
            font: 17px/1.65 Consolas, Monaco, "Courier New", monospace;
        }

        .lines {
            padding: 24px 14px 24px 20px;
            color: #566176;
            text-align: right;
            user-select: none;
            border-right: 1px solid var(--line);
            background: #f8fafc;
        }

        .code-wrap {
            position: relative;
            min-width: 0;
        }

        .code,
        .source {
            margin: 0;
            padding: 24px;
            overflow: auto;
            white-space: pre;
            outline: none;
            font: inherit;
            tab-size: 4;
        }

        .code {
            min-height: 100%;
            pointer-events: none;
        }

        .source {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            resize: none;
            color: transparent;
            background: transparent;
            caret-color: var(--text);
            -webkit-text-fill-color: transparent;
        }

        .source::selection {
            background: rgba(86, 156, 214, 0.28);
        }

        .kw { color: var(--keyword); font-weight: 700; }
        .class-name { color: var(--class); }
        .str { color: var(--string); }
        .num { color: var(--number); }
        .com { color: var(--comment); font-style: italic; }
        .op { color: var(--operator); }
        .fn { color: var(--function); }
        .var { color: var(--variable); }

        @media (max-width: 680px) {
            body {
                padding: 14px;
            }

            .editor {
                font-size: 14px;
                min-height: 420px;
            }

            .code,
            .source {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <main class="shot">
        <div class="topbar">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <span class="filename">Solo Leveling.demo</span>
        </div>

        <div class="editor" aria-label="Colorized code sample">
            <div class="lines" id="lines"></div>
            <div class="code-wrap">
                <pre class="code" id="code" aria-hidden="true"></pre>
                <textarea class="source" id="source" spellcheck="false" aria-label="Paste your language code">
energy hunter = "Sung Jinwoo"
energy hp = 80
energy mana

skill battle():

    energy damage = 20

    drain hp by damage

    cast hunter
    cast hp

use battle()

cast mana
                </textarea>
            </div>
        </div>
    </main>

    <script>
        const code = document.querySelector("#code");
        const source = document.querySelector("#source");
        const lines = document.querySelector("#lines");
        const keywords = new Set([
            "energy", "fate", "cycle", "realm", "skill", "shadow",
            "destiny", "gate", "cast", "and", "or", "not"
        ]);
        const booleans = new Set(["true", "false"]);
        const classes = new Set(["Hunter", "Mage"]);
        const escapeHtml = (value) => value
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        function colorize(raw) {
            let index = 0;
            let html = "";

            while (index < raw.length) {
                const char = raw[index];

                if (char === "#") {
                    const end = raw.indexOf("\n", index);
                    const token = end === -1 ? raw.slice(index) : raw.slice(index, end);
                    html += `<span class="com">${escapeHtml(token)}</span>`;
                    index += token.length;
                    continue;
                }

                if (char === "\"") {
                    let end = index + 1;
                    while (end < raw.length) {
                        if (raw[end] === "\"" && raw[end - 1] !== "\\") {
                            end += 1;
                            break;
                        }
                        end += 1;
                    }
                    html += `<span class="str">${escapeHtml(raw.slice(index, end))}</span>`;
                    index = end;
                    continue;
                }

                if (/\d/.test(char)) {
                    const match = raw.slice(index).match(/^\d+(?:\.\d+)?/)[0];
                    html += `<span class="num">${match}</span>`;
                    index += match.length;
                    continue;
                }

                if (/[A-Za-z_]/.test(char)) {
                    const word = raw.slice(index).match(/^[A-Za-z_]\w*/)[0];
                    const next = raw.slice(index + word.length).match(/^\s*(.)/);
                    const nextChar = next ? next[1] : "";
                    let className = "var";

                    if (keywords.has(word) || booleans.has(word)) {
                        className = "kw";
                    } else if (classes.has(word) || /^[A-Z]/.test(word)) {
                        className = "class-name";
                    } else if (nextChar === "(") {
                        className = "fn";
                    }

                    html += `<span class="${className}">${word}</span>`;
                    index += word.length;
                    continue;
                }

                if (/[-+*/=><!{}()[\]:,.]/.test(char)) {
                    const two = raw.slice(index, index + 2);
                    if (["==", "!=", "<=", ">="].includes(two)) {
                        html += `<span class="op">${escapeHtml(two)}</span>`;
                        index += 2;
                    } else {
                        html += `<span class="op">${escapeHtml(char)}</span>`;
                        index += 1;
                    }
                    continue;
                }

                html += escapeHtml(char);
                index += 1;
            }

            return html;
        }

        function updateLines(text) {
            const count = Math.max(1, text.split("\n").length);
            lines.innerHTML = Array.from({ length: count }, (_, index) => index + 1).join("<br>");
        }

        function render() {
            const text = source.value;
            code.innerHTML = colorize(text);
            updateLines(text);
        }

        function syncScroll() {
            code.scrollTop = source.scrollTop;
            code.scrollLeft = source.scrollLeft;
            lines.scrollTop = source.scrollTop;
        }

        source.addEventListener("input", render);
        source.addEventListener("scroll", syncScroll);
        source.addEventListener("keydown", (event) => {
            if (event.key !== "Tab") {
                return;
            }

            event.preventDefault();
            const start = source.selectionStart;
            const end = source.selectionEnd;
            source.value = `${source.value.slice(0, start)}    ${source.value.slice(end)}`;
            source.selectionStart = start + 4;
            source.selectionEnd = start + 4;
            render();
        });

        render();
    </script>
</body>
</html>
